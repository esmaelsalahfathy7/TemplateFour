<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="./CSS/all.min.css">
    <!-- Normalize -->
    <link rel="stylesheet" href="./CSS/Normalize.css">
    <!-- Css Main File -->
    <link rel="stylesheet" href="./CSS/main.css">
    <!-- Css File For Dashboard -->
    <link rel="stylesheet" href="./CSS/master.css">
    <!-- Font Family -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">  
</head>
<body>
    <div class="page">
        <div class="sidebar">
            <h2>Elzero</h2>
            <ul class="list">
                <li><a href="./dashboard.html"><i class="fas fa-regular fa-chart-bar "></i> <span>Dashboard</span></a></li>
                <li><a href="./settings.html"><i class="fas fa-regular fa-tools "></i> <span>Settings</span></a></li>
                <li><a href="./profile.html"><i class="fas fa-regular fa-regular fa-user "></i> <span>Profile</span></a></li>
                <li><a href="./projects.html"><i class="fas fa-regular fa-solid fa-project-diagram "></i> <span>Projects</span></a></li>
                <li><a href="./courses.html"><i class="fas fa-regular fa-graduation-cap "></i> <span>Courses</span></a></li>
                <li><a style="background-color: #f4f4f4;" href="./friends.html"><i class="fas fa-regular fa-user-circle "></i> <span>Friends</span></a></li>
                <li><a href="./files.html"><i class="fas fa-regular fa-file "></i> <span>Files</span></a></li>
                <li><a href="./plans.html"><i class="fas fa-regular fa-credit-card "></i> <span>Plans</span></a></li>
            </ul>
        </div>

        <section class="friends">
            <div class="header">
                <div class="search">
                    <i class="fas fa-search"></i>
                    <input type="search" name="" id="" placeholder="Type A Keyword">
                </div>
                <div class="user">
                    <span class="bell">
                        <i class="far fa-regular fa-bell"></i>
                    </span>
                    <img src="./image/avatar.png" alt="">
                </div>
            </div>

            <h1 class="section-title">Friends</h1>

            <div class="container"> 
                <div class="section-content">
                    <div class="friend">
                        <div class="contacts">
                            <i class="fas fa-solid fa-phone"></i>
                            <i class="fas fa-regular fa-envelope"></i>
                        </div>
                        <div class="main-info">
                            <img src="./image/friend-01.jpg" alt="">
                            <h4>Ahmed Nasser</h4>
                            <p>JavaScript Developer</p>
                        </div>
                        <div class="other-info vip">
                            <div>
                                <i class="fas fa-smile"></i>
                                <span>99 Friend</span>
                            </div>

                            <div>
                                <i class="fas fa-smile"></i>
                                <span>15 Projects</span>
                            </div>
                            
                            <div>
                                <i class="fas fa-solid fa-newspaper"></i>
                                <span>25 Articles</span>
                            </div>
                        </div>
                        <div class="footer">
                            <span>Joined 02/10/2021</span>
                            <div class="links">
                                <a href="./profile.html" class="profile">Profile</a>
                                <a href="#" class="remove">Remove</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </div>
    
</body>
</html>
